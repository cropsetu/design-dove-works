<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0B1F3A" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Default fallback meta — every route's <SEO /> component overrides these via react-helmet-async. -->
    <title>Star Security &amp; Bouncer — Pune's Trusted Security Agency | 18+ Years</title>
    <meta name="description" content="Pune-based, police-permitted security agency offering trained guards, bouncers, bodyguards, event &amp; corporate security across Maharashtra. ISO certified. 24/7 support.">
    <meta name="author" content="Star Security & Bouncer" />
    <link rel="canonical" href="https://www.starsecuritybouncer.com/" />

    <!-- Open Graph / Twitter — shared default; per-route SEO component can override. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.starsecuritybouncer.com/" />
    <meta property="og:image" content="https://www.starsecuritybouncer.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://www.starsecuritybouncer.com/og-image.jpg" />

    <!-- Preload the LCP hero image (first home-page slide) so its bytes start
         downloading during HTML parse, before CSS is even evaluated. Drops LCP
         on the home route by ~400-600 ms on Slow 4G. -->
    <link rel="preload" as="image" type="image/webp" href="/preload/hero-lcp.webp" fetchpriority="high" />

    <!-- Async-load Google Fonts so they don't block first paint. The print→all
         swap forces the browser to fetch them with low priority, then promote
         to render-blocking once parsed (the standard non-blocking pattern). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Roboto+Condensed:wght@500;700&family=Space+Grotesk:wght@600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Roboto+Condensed:wght@500;700&family=Space+Grotesk:wght@600;700&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
